<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>textformpractice</title>
  <script src="javascript/form.js" defer> </script>
  <link rel="stylesheet" href="stylesheets/styles.css">
  <link rel="stylesheet" href="stylesheets/pages/form.css">
  <link rel="icon" href="images/для иконки.png" type="image/png">

</head>

<body>

  <div class="overlay" id="overlay">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">

      <div class="modal-header">
        <h2 id="modal-title">Регистрация на экскурсию в Сыроварню в Мышкине</h2>
        <button class="btn-close" id="btn-close" aria-label="Закрыть">✕</button>
      </div>

      <div class="modal-body">
        <div class="form-grid">

          <div class="field">
            <label for="full-name">Полное имя</label>
            <input type="text" id="full-name" placeholder="" />
          </div>

          <!-- <div class="field">
            <label for="email">Электронная почта</label>
            <input type="email" id="email" placeholder="" />
          </div> -->

          <div class="field">
            <label for="dob">Дата рождения</label>
            <input type="date" id="dob" />
          </div>

          <div class="field">
            <label for="phone">Номер телефона</label>
            <input type="tel" id="phone" placeholder="" />
          </div>

          <div class="selects-row">
            <div class="selects-inner">
              <div class="field">
                <label for="personal-chapters">Читали нашу книгу?&nbsp;</label>
                <select id="personal-chapters">
                  <option value="yes">да</option>
                  <option value="no">нет</option>
                </select>
              </div>
              <div class="field">
                <label for="guide-format">Интересно?</label>
                <select id="guide-format">
                  <option value="yes">да</option>
                  <option value="no">нет</option>
                </select>
              </div>
            </div>
          </div>

          <!-- <div class="field textarea-field">
            <label for="comments">Пожелания</label>
            <textarea id="comments" rows="3"></textarea>
          </div> -->

        </div>

        <div class="checkbox-row">
          <input type="checkbox" id="been-there" />
          <label for="been-there">Я уже был/а в Мышкине</label>
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn-submit" id="btn-submit">подать заявку на экскурсию</button>
        <div class="success-msg" id="success-msg">Заявка успешно отправлена! Мы свяжемся с вами.</div>
      </div>

    </div>
  </div>


</body>

</html>
